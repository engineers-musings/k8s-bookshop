apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: bookshop
# `commonLabels` is deprecated in current kustomize — `labels` is the replacement.
labels:
  - pairs:
      part-of: bookshop
    includeSelectors: false
resources:
  - config.yaml
  - catalog.yaml
  - orders.yaml
  - web.yaml
  - postgres.yaml
