apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders
  labels:
    app: orders
    part-of: bookshop
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders
  template:
    metadata:
      labels:
        app: orders
        part-of: bookshop
    spec:
      containers:
        - name: orders
          image: bookshop:v1
          command: ["/usr/local/bin/orders"]
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: CATALOG_URL
              value: http://catalog
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            periodSeconds: 3
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 5
          resources:
            requests: { cpu: 20m, memory: 32Mi }
            limits: { memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: orders
spec:
  selector:
    app: orders
  ports:
    - name: http
      port: 80
      targetPort: http
