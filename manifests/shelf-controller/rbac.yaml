apiVersion: v1
kind: ServiceAccount
metadata:
  name: shelf-controller
  namespace: bookshop
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: shelf-controller
  namespace: bookshop
rules:
  # Note `shelves/status` is a SEPARATE resource from `shelves`. Granting one does
  # not grant the other, which is the point of the status subresource.
  - apiGroups: ["bookshop.engineers-musings.dev"]
    resources: ["shelves", "shelves/status"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: shelf-controller
  namespace: bookshop
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: shelf-controller
subjects:
  - kind: ServiceAccount
    name: shelf-controller
    namespace: bookshop
