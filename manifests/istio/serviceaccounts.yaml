# The mesh forces this. Before Istio, every bookshop service ran as the `default`
# ServiceAccount — so in SPIFFE terms they all had the SAME identity
# (spiffe://cluster.local/ns/bookshop/sa/default), and an identity-based policy
# could not tell web from orders from postgres.
#
# mTLS without distinct ServiceAccounts is encryption without authorization: a
# secure channel between two things you cannot tell apart.
apiVersion: v1
kind: ServiceAccount
metadata: { name: catalog, namespace: bookshop }
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: orders, namespace: bookshop }
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: web, namespace: bookshop }
