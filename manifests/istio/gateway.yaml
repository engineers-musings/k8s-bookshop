apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: bookshop-gw
  namespace: bookshop
spec:
  gatewayClassName: istio
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces: { from: Same }
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bookshop-routes
  namespace: bookshop
spec:
  parentRefs: [{ name: bookshop-gw }]
  rules:
    - matches: [{ path: { type: PathPrefix, value: /books } }]
      backendRefs: [{ name: catalog, port: 80 }]
    - matches: [{ path: { type: PathPrefix, value: / } }]
      backendRefs:
        # Weights are PROBABILISTIC, not a quota. 90/10 measured 93/7 over 100
        # requests through Istio (and 85/15 through NGINX in the Kubernetes book).
        - { name: web, port: 80, weight: 90 }
        - { name: web-canary, port: 80, weight: 10 }
